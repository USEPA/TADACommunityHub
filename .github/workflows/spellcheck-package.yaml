on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: spelling-check

permissions:
  contents: read
  checks: read
  statuses: read
  pull-requests: write
  issues: write

jobs:
  spelling-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install spellchecker
        run: install.packages("spelling")
        shell: Rscript {0}

      - name: Run spellcheck and capture output
        id: spellcheck
        shell: Rscript {0}
        run: |
          # Run spell check
          res <- spelling::spell_check_package()
          has_errors <- is.data.frame(res) && nrow(res) > 0

          # Create a simple log for PR comment
          log_path <- "spellcheck.log"
          header <- if (has_errors == TRUE) {
            sprintf("Spelling check failed. Found %d potential misspelling(s). Note: Run spelling::spell_check_package() locally and fix any misspellings; add approved project terms to WORDLIST with spelling::update_wordlist().", nrow(res))
          } else {
            "No spelling issues found."
          }
          cat(header, file = log_path, append = FALSE)

          # Append table to the log when there are errors
          if (has_errors) {
            cat("\n\n", file = log_path, append = TRUE)
            cat(paste(capture.output(print(res)), collapse = "\n"), file = log_path, append = TRUE)
          }

          # Set step output 'ok' for downstream steps
          out <- Sys.getenv("GITHUB_OUTPUT")
          cat(sprintf("ok=%s\n", if (!has_errors) "true" else "false"), file = out, append = TRUE)

      - name: Comment on PR with spelling results (same-repo PRs only)
        if: github.event_name == 'pull_request' && steps.spellcheck.outputs.ok == 'false' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v9
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const number = context.issue.number;

            let log = '(no log found)';
            if (fs.existsSync('spellcheck.log')) {
              log = fs.readFileSync('spellcheck.log', 'utf8');
              const max = 65000;
              if (log.length > max) log = log.slice(0, max) + '\n… (truncated)';
            }

            const body = [
              '<!-- spellcheck-report -->',
              'Spelling check failed. Details:',
              '',
              '```',
              log.trim(),
              '```'
            ].join('\n');

            try {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: number,
                body
              });
              core.info('Posted PR comment with spelling results.');
            } catch (error) {
              core.error(`Failed to post comment: ${error?.status || ''} ${error?.message || error}`);
              throw error;
            }

      - name: Fail job if spelling errors
        if: steps.spellcheck.outputs.ok == 'false'
        shell: Rscript {0}
        run: |
          stop("Spelling errors found. See PR comment for details.")
